<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Crônica IA</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  display:flex;
  height:100vh;
  background:#0e0e11;
  font-family:Segoe UI, sans-serif;
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:270px;
  background:#15151c;
  border-right:1px solid #222;
  padding:15px;
  display:flex;
  flex-direction:column;
}

.logo{
  font-size:20px;
  font-weight:bold;
  margin-bottom:15px;
  color:#a855f7;
}

.conversation{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 10px;
  margin-bottom:6px;
  border-radius:8px;
  background:#1d1d26;
  cursor:pointer;
  transition:0.2s;
}

.conversation:hover{
  background:#262633;
}

.conversation.active{
  background:#6d28d9;
}

.conv-name{
  flex:1;
  font-size:14px;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.conv-actions{
  display:flex;
  gap:6px;
}

.conv-actions button{
  background:none;
  border:none;
  cursor:pointer;
  color:#aaa;
  font-size:14px;
}

.conv-actions button:hover{
  color:white;
}

.new-btn{
  margin-top:auto;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#7c3aed;
  color:white;
  cursor:pointer;
}

/* CHAT */
.chat-container{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header{
  padding:15px;
  border-bottom:1px solid #222;
  font-weight:bold;
  background:#121217;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.message{
  margin-bottom:15px;
  line-height:1.5;
}

.user{ color:#38bdf8; }
.bot{ color:#c084ff; }

.typing span{
  display:inline-block;
  width:6px;
  height:6px;
  margin-right:3px;
  background:#c084ff;
  border-radius:50%;
  animation:blink 1.4s infinite both;
}

.typing span:nth-child(2){ animation-delay:.2s; }
.typing span:nth-child(3){ animation-delay:.4s; }

@keyframes blink{
  0%{opacity:.2;}
  20%{opacity:1;}
  100%{opacity:.2;}
}

/* INPUT */
.input-wrapper{
  border-top:1px solid #222;
  padding:10px 15px;
  background:#121217;
}

.input-area{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1e1e28;
  color:white;
  outline:none;
}

button.send{
  padding:12px 18px;
  border-radius:10px;
  border:none;
  background:#9333ea;
  color:white;
  cursor:pointer;
}

/* MODES */
.modes{
  margin-top:8px;
  display:flex;
  gap:10px;
}

.modes button{
  padding:6px 12px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  background:#1e1e28;
  color:#aaa;
  font-size:13px;
}

.modes button.active{
  background:#a855f7;
  color:white;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">Crônica</div>
  <div id="conversations"></div>
  <button class="new-btn" onclick="newConversation()">+ Nova Conversa</button>
</div>

<div class="chat-container">

  <div class="header">🧠 Crônica IA</div>

  <div id="chat" class="chat"></div>

  <div class="input-wrapper">
    <div class="input-area">
      <input id="message" placeholder="Digite sua mensagem..." />
      <button class="send" onclick="sendMessage()">Enviar</button>
    </div>

    <div class="modes">
      <button id="fastBtn" class="active">⚡ Rápido</button>
      <button id="thinkBtn">🧠 Pensar</button>
    </div>
  </div>

</div>

<script>
let mode="fast";
let conversations=JSON.parse(localStorage.getItem("cronica_conversations"))||[];
let currentId=null;

const chat=document.getElementById("chat");
const conversationsDiv=document.getElementById("conversations");

document.getElementById("fastBtn").onclick=()=>{
  mode="fast";
  fastBtn.classList.add("active");
  thinkBtn.classList.remove("active");
};

document.getElementById("thinkBtn").onclick=()=>{
  mode="think";
  thinkBtn.classList.add("active");
  fastBtn.classList.remove("active");
};

function save(){
  localStorage.setItem("cronica_conversations",JSON.stringify(conversations));
}

function renderConversations(){
  conversationsDiv.innerHTML="";
  conversations.forEach(conv=>{
    const div=document.createElement("div");
    div.className="conversation"+(conv.id===currentId?" active":"");

    const name=document.createElement("div");
    name.className="conv-name";
    name.innerText=conv.name;
    name.onclick=()=>loadConversation(conv.id);

    const actions=document.createElement("div");
    actions.className="conv-actions";

    const renameBtn=document.createElement("button");
    renameBtn.innerHTML="✏️";
    renameBtn.onclick=(e)=>{
      e.stopPropagation();
      const newName=prompt("Novo nome:");
      if(newName){
        conv.name=newName;
        save();
        renderConversations();
      }
    };

    const deleteBtn=document.createElement("button");
    deleteBtn.innerHTML="🗑";
    deleteBtn.onclick=(e)=>{
      e.stopPropagation();
      conversations=conversations.filter(c=>c.id!==conv.id);
      save();
      renderConversations();
      chat.innerHTML="";
    };

    actions.appendChild(renameBtn);
    actions.appendChild(deleteBtn);

    div.appendChild(name);
    div.appendChild(actions);

    conversationsDiv.appendChild(div);
  });
}

function newConversation(){
  const id=Date.now();
  conversations.push({id,name:"Nova Conversa",messages:[]});
  currentId=id;
  save();
  renderConversations();
  chat.innerHTML="";
}

function loadConversation(id){
  currentId=id;
  const conv=conversations.find(c=>c.id===id);
  chat.innerHTML="";
  conv.messages.forEach(msg=>{
    chat.innerHTML+=`<div class="message ${msg.role}"><b>${msg.role==="user"?"Você":"Crônica"}:</b> ${msg.content}</div>`;
  });
  renderConversations();
}

document.getElementById("message").addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});

async function sendMessage(){
  const input=document.getElementById("message");
  const text=input.value.trim();
  if(!text||!currentId) return;

  const conv=conversations.find(c=>c.id===currentId);

  conv.messages.push({role:"user",content:text});
  chat.innerHTML+=`<div class="message user"><b>Você:</b> ${text}</div>`;
  input.value="";

  const typing=document.createElement("div");
  typing.className="message bot typing";
  typing.innerHTML="<span></span><span></span><span></span>";
  chat.appendChild(typing);
  chat.scrollTop=chat.scrollHeight;

  const systemPrompt=mode==="think"
    ?"Você é Crônica, profunda e analítica."
    :"Você é Crônica, rápida e objetiva.";

  const response=await fetch("/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:text,system:systemPrompt})
  });

  const data=await response.json();
  typing.remove();

  const botDiv=document.createElement("div");
  botDiv.className="message bot";
  botDiv.innerHTML="<b>Crônica:</b> ";
  chat.appendChild(botDiv);

  let i=0;
  function typeLetter(){
    if(i<data.reply.length){
      botDiv.innerHTML+=data.reply[i];
      i++;
      chat.scrollTop=chat.scrollHeight;
      setTimeout(typeLetter,12);
    }
  }
  typeLetter();

  conv.messages.push({role:"bot",content:data.reply});
  save();
}

if(conversations.length===0)newConversation();
else{
  currentId=conversations[0].id;
  loadConversation(currentId);
}
renderConversations();
</script>

</body>
</html>
